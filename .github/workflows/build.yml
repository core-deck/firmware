name: Build firmware

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write  # for release uploads on tags

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: qmkfm/qmk_cli:latest
    strategy:
      matrix:
        keymap: [default, vial]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build ${{ matrix.keymap }}
        run: ./build.sh ${{ matrix.keymap }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: core_deck_rev1_${{ matrix.keymap }}
          path: core_deck_rev1_${{ matrix.keymap }}.uf2
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.uf2
          fail_on_unmatched_files: true
